<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cidade VR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{
margin:0;
}
</style>

</head>

<body>

<a-scene>

<!-- iluminação -->
<a-light type="ambient" intensity="0.9"></a-light>
<a-light type="directional" position="20 30 10" intensity="1"></a-light>

<!-- céu -->
<a-sky color="#cfe8f3"></a-sky>

<!-- GRAMA GERAL -->
<a-plane rotation="-90 0 0" width="500" height="500" color="#5f8f6f"></a-plane>

<!-- RUA -->
<a-plane rotation="-90 0 0" position="0 0.02 0" width="120" height="20" color="#4f4f4f"></a-plane>

<a-plane rotation="-90 0 0" position="0 0.02 0" width="20" height="120" color="#4f4f4f"></a-plane>

<!-- CALÇADAS -->
<a-plane rotation="-90 0 0" position="0 0.03 0" width="80" height="80" color="#d9d9d9"></a-plane>

<!-- PRAÇA CENTRAL -->
<a-plane rotation="-90 0 0" position="0 0.04 0" width="40" height="40" color="#e6e6e6"></a-plane>

<!-- FONTE -->
<a-cylinder position="0 0.4 0" radius="4" height="0.8" color="#bfbfbf"></a-cylinder>

<a-cylinder position="0 1.3 0" radius="0.6" height="1.8" color="#a6a6a6"></a-cylinder>

<a-sphere position="0 3 0" radius="0.5" color="#7fb3d5"></a-sphere>

<!-- BANCOS -->

<a-box position="6 0.5 6" width="3" height="0.3" depth="1" color="#6e6e6e"></a-box>
<a-box position="6 1 5.5" width="3" height="1" depth="0.2" color="#6e6e6e"></a-box>

<a-box position="-6 0.5 6" width="3" height="0.3" depth="1" color="#6e6e6e"></a-box>
<a-box position="-6 1 5.5" width="3" height="1" depth="0.2" color="#6e6e6e"></a-box>

<a-box position="6 0.5 -6" width="3" height="0.3" depth="1" color="#6e6e6e"></a-box>
<a-box position="6 1 -6.5" width="3" height="1" depth="0.2" color="#6e6e6e"></a-box>

<a-box position="-6 0.5 -6" width="3" height="0.3" depth="1" color="#6e6e6e"></a-box>
<a-box position="-6 1 -6.5" width="3" height="1" depth="0.2" color="#6e6e6e"></a-box>

<!-- ÁRVORES -->

<a-cylinder position="12 2 -12" radius="0.4" height="4" color="#8c5a3c"></a-cylinder>
<a-sphere position="12 5 -12" radius="2.5" color="#3f704d"></a-sphere>

<a-cylinder position="-12 2 -12" radius="0.4" height="4" color="#8c5a3c"></a-cylinder>
<a-sphere position="-12 5 -12" radius="2.5" color="#3f704d"></a-sphere>

<a-cylinder position="12 2 12" radius="0.4" height="4" color="#8c5a3c"></a-cylinder>
<a-sphere position="12 5 12" radius="2.5" color="#3f704d"></a-sphere>

<a-cylinder position="-12 2 12" radius="0.4" height="4" color="#8c5a3c"></a-cylinder>
<a-sphere position="-12 5 12" radius="2.5" color="#3f704d"></a-sphere>

<a-cylinder position="0 2 -15" radius="0.4" height="4" color="#8c5a3c"></a-cylinder>
<a-sphere position="0 5 -15" radius="2.5" color="#3f704d"></a-sphere>

<a-cylinder position="0 2 15" radius="0.4" height="4" color="#8c5a3c"></a-cylinder>
<a-sphere position="0 5 15" radius="2.5" color="#3f704d"></a-sphere>

<!-- POSTES -->

<a-cylinder position="10 2 0" radius="0.1" height="4" color="#777"></a-cylinder>
<a-sphere position="10 4.3 0" radius="0.3" color="#ffffff"></a-sphere>

<a-cylinder position="-10 2 0" radius="0.1" height="4" color="#777"></a-cylinder>
<a-sphere position="-10 4.3 0" radius="0.3" color="#ffffff"></a-sphere>

<a-cylinder position="0 2 10" radius="0.1" height="4" color="#777"></a-cylinder>
<a-sphere position="0 4.3 10" radius="0.3" color="#ffffff"></a-sphere>

<a-cylinder position="0 2 -10" radius="0.1" height="4" color="#777"></a-cylinder>
<a-sphere position="0 4.3 -10" radius="0.3" color="#ffffff"></a-sphere>

<!-- PRÉDIOS AO REDOR -->

<a-box position="30 10 30" width="12" height="20" depth="12" color="#bfbfbf"></a-box>
<a-box position="-30 12 30" width="14" height="24" depth="14" color="#a6a6a6"></a-box>
<a-box position="30 15 -30" width="16" height="30" depth="16" color="#999"></a-box>
<a-box position="-30 8 -30" width="10" height="16" depth="10" color="#b3b3b3"></a-box>

<a-box position="45 14 0" width="14" height="28" depth="14" color="#8c8c8c"></a-box>
<a-box position="-45 10 0" width="12" height="20" depth="12" color="#9e9e9e"></a-box>


<a-sphere position="0 1.6 25" radius="0.5" color="red"></a-sphere>
<a-sphere position="0 1.6 25" radius="0.5" color="blue"></a-sphere>

<!-- JOGADOR -->

<a-entity position="0 1.6 25">

<a-camera wasd-controls look-controls>

<a-cursor color="#333"></a-cursor>

</a-camera>

</a-entity>

</a-scene>

</body>
</html>
